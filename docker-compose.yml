services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.5
    container_name: keycloak-local
    command: start-dev --features=admin-fine-grained-authz,scripts
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

volumes:
  keycloak_data:
